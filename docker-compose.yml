version: "3.8"

services:

  # MongoDB — persistent data via named volume
  mongo:
    image: mongo:6
    container_name: todo_mongo
    restart: always
    volumes:
      - mongo_data:/data/db        # named volume keeps data after restarts
    networks:
      - todo_network

  # Express backend (image pushed to Docker Hub)
  backend:
    image: YOUR_DOCKERHUB_USERNAME/todo-backend:latest
    container_name: todo_backend
    restart: always
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/tododb
      JWT_SECRET: a3f8c2e1d4b7a9f0e2c5d8b1a4f7c0e3d6b9a2f5c8e1d4b7a0f3c6e9d2b5a8f1
      JWT_EXPIRE: 7d
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    networks:
      - todo_network

  # React frontend served via Nginx
  frontend:
    image: YOUR_DOCKERHUB_USERNAME/todo-frontend:latest
    container_name: todo_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todo_network

volumes:
  mongo_data:        # persistent volume for MongoDB data

networks:
  todo_network:
    driver: bridge
